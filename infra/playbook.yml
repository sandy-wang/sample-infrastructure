      template:
        src: "{{ item }}"
        dest: '{{ working_dir }}/{{ item | basename | regex_replace("\.j2","") }}'
      # fileglob lookup : Patterns/wildcard are only supported on files, not directory/paths.
      with_fileglob:
        - "k8s_templates/testing-csidriver/*.yaml.j2"
      register: testing_csidriver
      tags:
        - testing
